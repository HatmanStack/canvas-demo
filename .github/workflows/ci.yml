name: CI

on:
  push:
    branches: [github-branch]
  pull_request:
    branches: [github-branch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system ruff

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system mypy boto3-stubs[s3,bedrock-runtime,logs] types-Pillow

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional --allow-untyped-defs

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v --tb=short -m "not integration"

      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=75 -m "not integration"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          PERSISTENCE: "0"
        options: >-
          --health-cmd="curl -f http://localhost:4566/_localstack/health"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest pytest-cov pytest-asyncio

      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health; then
              echo "LocalStack is ready"
              exit 0
            fi
            echo "Waiting for LocalStack... ($i/30)"
            sleep 2
          done
          echo "ERROR: LocalStack failed to become ready after 60s"
          exit 1

      - name: Run integration tests
        env:
          LOCALSTACK_URL: http://localhost:4566
        run: pytest tests/integration/ -v -m integration

  all-checks:
    name: All Checks Pass
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, integration-test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.integration-test.result }}" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed!"
