version: 1.0
runtime: python311
build:
  commands:
    # Build commands can be used for compilation or asset generation if needed
    # We'll move the main dependency installation to pre-run
    build:
      - echo "Build phase completed (dependencies installed in pre-run)."
  # Environment variables available during the build phase (if needed)
  # env:
  #   - name: BUILD_VAR_EXAMPLE
  #     value: "example_build_value"
run:
  # Install dependencies in pre-run for Python 3.11 revised build
  pre-run:
    - echo "Installing dependencies using pip3 in pre-run..."
    - pip3 install --upgrade pip
    - pip3 install -r requirements.txt
  command: python3 app.py # Use python3 for Python 3.11
  network:
    port: 7860
    env: APP_PORT
  # Environment variables available during the run phase
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: DEBUG_MODE
      value: "false"
    - name: GRADIO_SERVER_NAME
      value: "0.0.0.0"
    - name: GRADIO_SERVER_PORT
      value: "7860"
    - name: RATE_LIMIT
      value: "20"
    - name: NOVA_IMAGE_BUCKET
      value: "nova-image-data"
    - name: BUCKET_REGION
      value: "us-west-2"
  secrets:
    - name: AMP_AWS_ID
      value-from: "arn:aws:secretsmanager:us-west-2:631094035453:secret:apprunner-canvas-demo-secret-pHJCme"
    
